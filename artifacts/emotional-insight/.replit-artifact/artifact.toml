kind = "web"
previewPath = "/"
title = "Emotional Insight"
version = "1.0.0"
id = "artifacts/emotional-insight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18220

[services.development]
run = "pnpm --filter @workspace/emotional-insight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emotional-insight", "run", "build" ]
publicDir = "artifacts/emotional-insight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18220"
BASE_PATH = "/"
